<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triple Pendulum 3D Chaos Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-panel: rgba(12, 12, 20, 0.88);
      --bg-panel-border: rgba(255, 255, 255, 0.08);
      --text-primary: #e0e0e8;
      --text-muted: #888899;
      --text-accent: #00f0ff;
      --glow-cyan: 0 0 12px rgba(0, 240, 255, 0.4);
      --font-mono: 'Share Tech Mono', monospace;
      --font-display: 'Orbitron', sans-serif;
      --transition-speed: 0.3s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-mono);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* CRT Scanline Overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.04) 2px,
        rgba(0, 0, 0, 0.04) 4px
      );
    }

    #canvas-container {
      position: absolute;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* Controls Panel */
    #controls {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 260px;
      max-height: calc(100vh - 24px);
      background: var(--bg-panel);
      border: 1px solid var(--bg-panel-border);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-size: 12px;
      backdrop-filter: blur(12px);
      z-index: 50;
    }

    #controls-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.06);
      border-bottom: 1px solid var(--bg-panel-border);
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }

    #controls-header:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    #controls-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-accent);
      text-shadow: var(--glow-cyan);
    }

    #collapse-icon {
      font-size: 10px;
      color: var(--text-muted);
      transition: transform 0.2s;
    }

    #controls.collapsed #collapse-icon {
      transform: rotate(-90deg);
    }

    #controls-body {
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #controls.collapsed #controls-body {
      display: none;
    }

    /* Scrollbar */
    #controls-body::-webkit-scrollbar {
      width: 4px;
    }
    #controls-body::-webkit-scrollbar-track {
      background: transparent;
    }
    #controls-body::-webkit-scrollbar-thumb {
      background: rgba(0, 240, 255, 0.2);
      border-radius: 2px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .control-row label {
      color: var(--text-primary);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .control-row .value-label {
      color: var(--text-muted);
      min-width: 40px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      flex: 1;
      height: 3px;
      appearance: none;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--text-accent);
      cursor: pointer;
      box-shadow: 0 0 6px rgba(0, 240, 255, 0.5), 0 0 12px rgba(0, 240, 255, 0.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--text-accent);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 6px rgba(0, 240, 255, 0.5), 0 0 12px rgba(0, 240, 255, 0.2);
    }

    input[type="checkbox"] {
      appearance: none;
      width: 14px;
      height: 14px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
    }

    input[type="checkbox"]:checked {
      background: var(--text-accent);
      border-color: var(--text-accent);
      box-shadow: 0 0 4px rgba(0, 240, 255, 0.4);
    }

    input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 1px;
      width: 5px;
      height: 8px;
      border: 2px solid var(--bg-primary);
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    select {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      border: 1px solid var(--bg-panel-border);
      border-radius: 4px;
      padding: 4px 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      width: 100%;
      transition: border-color var(--transition-speed);
    }
    select:hover { border-color: rgba(0, 240, 255, 0.3); }
    select:focus { border-color: var(--text-accent); outline: none; box-shadow: 0 0 4px rgba(0, 240, 255, 0.2); }
    select option { background: #0a0a1a; color: var(--text-primary); }

    .divider {
      border: none;
      border-top: 1px solid var(--bg-panel-border);
    }

    /* Colormap legend */
    #colormap-legend {
      margin-top: 6px;
    }
    #legend-canvas {
      width: 100%;
      height: 12px;
      border-radius: 2px;
      display: block;
    }
    .legend-labels {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Slice axis block */
    .slice-axis {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .slice-axis-header {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .slice-axis-header label {
      color: var(--text-primary);
      flex: 1;
    }

    .slice-axis-header .value-label {
      color: var(--text-muted);
      min-width: 44px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .slice-axis input[type="range"] {
      margin-left: 20px;
    }

    /* Stats */
    #stats {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 4px;
      padding: 7px 10px;
      line-height: 1.6;
      color: var(--text-muted);
    }

    #stats span {
      color: var(--text-accent);
      font-weight: 600;
      text-shadow: 0 0 6px rgba(0, 240, 255, 0.3);
    }

    /* Loading overlay */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      z-index: 100;
      gap: 16px;
      transition: opacity 0.4s;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0, 240, 255, 0.15);
      border-top-color: var(--text-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      box-shadow: 0 0 12px rgba(0, 240, 255, 0.2);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loading-text {
      color: var(--text-muted);
      font-size: 13px;
    }

    /* Info badge (demo mode) */
    #demo-badge {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(0, 240, 255, 0.1);
      border: 1px solid rgba(0, 240, 255, 0.3);
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 11px;
      color: var(--text-accent);
      text-shadow: 0 0 6px rgba(0, 240, 255, 0.3);
      display: none;
      z-index: 50;
    }

    /* Octant buttons */
    .octant-btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--bg-panel-border);
      border-radius: 4px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 4px 0;
      cursor: pointer;
      transition: all var(--transition-speed);
    }
    .octant-btn:hover {
      border-color: rgba(0, 240, 255, 0.3);
      color: var(--text-accent);
    }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="loading">
  <div class="spinner"></div>
  <div id="loading-text">Loading simulation data...</div>
</div>

<div id="controls">
  <div id="controls-header" onclick="togglePanel()">
    <span id="controls-title">Triple Pendulum</span>
    <span id="collapse-icon">&#9660;</span>
  </div>
  <div id="controls-body">

    <!-- Stats -->
    <div id="stats">Loading...</div>

    <hr class="divider" />

    <!-- Dataset -->
    <div>
      <div class="section-label">Dataset</div>
      <div class="control-row" style="margin-bottom:7px">
        <label>Backend</label>
        <select id="backend-select" style="flex:1" onchange="changeBackend()">
          <option value="cpu" selected>CPU</option>
          <option value="gpu">GPU</option>
        </select>
      </div>
      <div class="control-row">
        <label>Resolution</label>
        <select id="resolution-select" style="flex:1" onchange="changeResolution()">
        </select>
      </div>
    </div>

    <hr class="divider" />

    <!-- Colormap -->
    <div>
      <div class="section-label">Colormap</div>
      <div class="control-row" style="gap:4px">
        <select id="colormap-select" style="flex:1" onchange="changeColormap()">
          <option value="cyberpunk" selected>Cyberpunk</option>
          <option value="magma">Magma</option>
          <option value="viridis">Viridis</option>
          <option value="inferno">Inferno</option>
          <option value="plasma">Plasma</option>
          <option value="cividis">Cividis</option>
        </select>
        <button class="octant-btn" id="invert-btn" style="flex:0 0 auto;padding:4px 8px" onclick="toggleInvertColormap()">Inv</button>
      </div>
      <div id="colormap-legend">
        <canvas id="legend-canvas" width="236" height="12"></canvas>
        <div class="legend-labels">
          <span>Fast flip</span>
          <span>Stable</span>
        </div>
      </div>
    </div>

    <hr class="divider" />

    <!-- Point appearance -->
    <div>
      <div class="section-label">Appearance</div>

      <div class="control-row" style="margin-bottom:7px">
        <label>Point size</label>
        <input type="range" id="point-size" min="1" max="10" step="0.5" value="2" oninput="updatePointSize()" />
        <span class="value-label" id="point-size-val">2</span>
      </div>

      <div class="control-row">
        <label>Opacity</label>
        <input type="range" id="opacity" min="0.05" max="1" step="0.05" value="0.05" oninput="updateOpacity()" />
        <span class="value-label" id="opacity-val">0.05</span>
      </div>
    </div>

    <hr class="divider" />

    <!-- Time filter -->
    <div>
      <div class="section-label">Flip time filter</div>

      <div class="control-row" style="margin-bottom:7px">
        <label>Min</label>
        <input type="range" id="time-min" min="0" max="1" step="0.01" value="0" oninput="updateTimeFilter()" />
        <span class="value-label" id="time-min-val">0.0 s</span>
      </div>

      <div class="control-row">
        <label>Max</label>
        <input type="range" id="time-max" min="0" max="1" step="0.01" value="1" oninput="updateTimeFilter()" />
        <span class="value-label" id="time-max-val">-- s</span>
      </div>

      <div class="control-row" style="margin-top:7px">
        <label>Show stable</label>
        <input type="checkbox" id="show-stable" checked onchange="applyFilters()" />
      </div>
    </div>

    <hr class="divider" />

    <!-- Slice controls -->
    <div>
      <div class="section-label">Slice controls</div>

      <div class="control-row" style="margin-bottom:4px">
        <label>Thickness</label>
        <input type="range" id="slice-thickness" min="1" max="20" step="1" value="5" oninput="updateSliceThickness()" />
        <span class="value-label" id="slice-thickness-val">5°</span>
      </div>
    </div>

    <!-- Axis slices -->
    <div class="slice-axis">
      <div class="slice-axis-header">
        <input type="checkbox" id="slice-x-en" onchange="applyFilters()" />
        <label>&#952;&#8321; slice</label>
        <span class="value-label" id="slice-x-val">0°</span>
      </div>
      <input type="range" id="slice-x" min="-170" max="170" step="1" value="0" oninput="updateSliceLabel('x')" />
    </div>

    <div class="slice-axis">
      <div class="slice-axis-header">
        <input type="checkbox" id="slice-y-en" onchange="applyFilters()" />
        <label>&#952;&#8322; slice</label>
        <span class="value-label" id="slice-y-val">0°</span>
      </div>
      <input type="range" id="slice-y" min="-170" max="170" step="1" value="0" oninput="updateSliceLabel('y')" />
    </div>

    <div class="slice-axis">
      <div class="slice-axis-header">
        <input type="checkbox" id="slice-z-en" onchange="applyFilters()" />
        <label>&#952;&#8323; slice</label>
        <span class="value-label" id="slice-z-val">0°</span>
      </div>
      <input type="range" id="slice-z" min="-170" max="170" step="1" value="0" oninput="updateSliceLabel('z')" />
    </div>

    <hr class="divider" />

    <!-- Octant controls -->
    <div>
      <div class="section-label">Octant controls</div>

      <div class="control-row" style="margin-bottom:8px;gap:4px">
        <button class="octant-btn" onclick="showAllOctants()">Show All</button>
        <button class="octant-btn" onclick="hideAllOctants()">Hide All</button>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 8px">
        <div class="control-row">
          <input type="checkbox" id="octant-1" checked onchange="applyFilters()" />
          <label style="font-size:11px">1 +++</label>
        </div>
        <div class="control-row">
          <input type="checkbox" id="octant-2" checked onchange="applyFilters()" />
          <label style="font-size:11px">2 ++-</label>
        </div>
        <div class="control-row">
          <input type="checkbox" id="octant-3" checked onchange="applyFilters()" />
          <label style="font-size:11px">3 +-+</label>
        </div>
        <div class="control-row">
          <input type="checkbox" id="octant-4" checked onchange="applyFilters()" />
          <label style="font-size:11px">4 +--</label>
        </div>
        <div class="control-row">
          <input type="checkbox" id="octant-5" checked onchange="applyFilters()" />
          <label style="font-size:11px">5 -++</label>
        </div>
        <div class="control-row">
          <input type="checkbox" id="octant-6" checked onchange="applyFilters()" />
          <label style="font-size:11px">6 -+-</label>
        </div>
        <div class="control-row">
          <input type="checkbox" id="octant-7" checked onchange="applyFilters()" />
          <label style="font-size:11px">7 --+</label>
        </div>
        <div class="control-row">
          <input type="checkbox" id="octant-8" checked onchange="applyFilters()" />
          <label style="font-size:11px">8 ---</label>
        </div>
      </div>
    </div>

  </div><!-- end controls-body -->
</div><!-- end controls -->

<div id="demo-badge">DEMO MODE — random data</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── State ────────────────────────────────────────────────────────────────────

const state = {
  gridSize: 0,
  thetaRange: [-170, 170],
  flipTimes: null,       // Float32Array, length N^3, NaN = never flipped
  tMax: 0,
  pointCount: 0,
  currentColormap: 'cyberpunk',
  invertColormap: false,
  // Three.js objects
  scene: null,
  camera: null,
  renderer: null,
  controls: null,
  points: null,
  geometry: null,
  // Per-point cache (computed once from raw data)
  positions: null,       // Float32Array N^3 * 3
  rawColors: null,       // Float32Array N^3 * 3 (base colormap, no opacity baking)
  isStable: null,        // Uint8Array N^3, 1 = never flipped
  // Visible flags computed by filter pass
  visibleFlags: null,    // Uint8Array N^3
};

// ─── Colormaps ───────────────────────────────────────────────────────────────

const COLORMAPS = {
  cyberpunk: [
    [0.000, [0.040, 0.000, 0.080]],
    [0.150, [0.000, 0.120, 0.300]],
    [0.350, [0.000, 0.940, 1.000]],
    [0.550, [1.000, 0.330, 0.870]],
    [0.750, [1.000, 0.867, 0.000]],
    [1.000, [1.000, 1.000, 1.000]],
  ],
  magma: [
    [0.000, [0.001, 0.000, 0.014]],
    [0.130, [0.172, 0.005, 0.200]],
    [0.280, [0.460, 0.040, 0.310]],
    [0.450, [0.750, 0.100, 0.140]],
    [0.620, [0.950, 0.380, 0.060]],
    [0.780, [0.990, 0.660, 0.200]],
    [0.900, [1.000, 0.880, 0.500]],
    [1.000, [1.000, 1.000, 1.000]],
  ],
  viridis: [
    [0.000, [0.267, 0.004, 0.329]],
    [0.125, [0.282, 0.141, 0.458]],
    [0.250, [0.254, 0.265, 0.530]],
    [0.375, [0.206, 0.372, 0.553]],
    [0.500, [0.128, 0.566, 0.551]],
    [0.625, [0.120, 0.620, 0.536]],
    [0.750, [0.210, 0.718, 0.472]],
    [0.875, [0.565, 0.811, 0.314]],
    [1.000, [0.993, 0.906, 0.144]],
  ],
  inferno: [
    [0.000, [0.001, 0.000, 0.014]],
    [0.140, [0.190, 0.015, 0.260]],
    [0.300, [0.500, 0.030, 0.340]],
    [0.460, [0.760, 0.150, 0.170]],
    [0.620, [0.940, 0.370, 0.020]],
    [0.780, [0.990, 0.650, 0.040]],
    [0.900, [0.990, 0.890, 0.300]],
    [1.000, [0.988, 0.998, 0.645]],
  ],
  plasma: [
    [0.000, [0.050, 0.030, 0.530]],
    [0.140, [0.290, 0.010, 0.610]],
    [0.300, [0.520, 0.030, 0.560]],
    [0.460, [0.720, 0.120, 0.430]],
    [0.620, [0.900, 0.270, 0.250]],
    [0.780, [0.990, 0.490, 0.080]],
    [0.900, [0.990, 0.720, 0.030]],
    [1.000, [0.940, 0.975, 0.131]],
  ],
  cividis: [
    [0.000, [0.000, 0.133, 0.302]],
    [0.167, [0.153, 0.208, 0.380]],
    [0.333, [0.337, 0.318, 0.380]],
    [0.500, [0.478, 0.443, 0.380]],
    [0.667, [0.616, 0.576, 0.349]],
    [0.833, [0.769, 0.722, 0.290]],
    [1.000, [0.996, 0.878, 0.216]],
  ],
};

function sampleColormap(t, mapName) {
  t = Math.max(0, Math.min(1, t));
  if (state.invertColormap) t = 1 - t;
  const stops = COLORMAPS[mapName] || COLORMAPS.cyberpunk;
  let lo = stops[0], hi = stops[stops.length - 1];
  for (let i = 1; i < stops.length; i++) {
    if (t <= stops[i][0]) {
      hi = stops[i];
      lo = stops[i - 1];
      break;
    }
  }
  const span = hi[0] - lo[0];
  const f = span > 0 ? (t - lo[0]) / span : 0;
  return [
    lo[1][0] + f * (hi[1][0] - lo[1][0]),
    lo[1][1] + f * (hi[1][1] - lo[1][1]),
    lo[1][2] + f * (hi[1][2] - lo[1][2]),
  ];
}

function drawLegend() {
  const canvas = document.getElementById('legend-canvas');
  const ctx = canvas.getContext('2d');
  const width = canvas.width;
  const height = canvas.height;
  ctx.clearRect(0, 0, width, height);
  for (let x = 0; x < width; x++) {
    const t = x / (width - 1);
    const rgb = sampleColormap(t, state.currentColormap);
    ctx.fillStyle = `rgb(${Math.round(rgb[0]*255)},${Math.round(rgb[1]*255)},${Math.round(rgb[2]*255)})`;
    ctx.fillRect(x, 0, 1, height);
  }
}

// ─── Data loading ─────────────────────────────────────────────────────────────

// Dataset manifest: backend -> [{resolution, file, label}]
const DATASETS = {
  cpu: [
    { resolution: 80, file: '../../data/simulation_80_cpu.json', label: '80\u00B3 (512K pts)' },
    { resolution: 40, file: '../../data/simulation_40_cpu.json', label: '40\u00B3 (64K pts)' },
  ],
  gpu: [
    { resolution: 40, file: '../../data/simulation_40_gpu.json', label: '40\u00B3 (64K pts)' },
  ],
};

function populateResolutionSelect(backend) {
  const select = document.getElementById('resolution-select');
  const entries = DATASETS[backend] || [];
  select.innerHTML = '';
  for (const entry of entries) {
    const option = document.createElement('option');
    option.value = entry.resolution;
    option.textContent = entry.label;
    select.appendChild(option);
  }
}

function getSelectedFile() {
  const backend = document.getElementById('backend-select').value;
  const resolution = parseInt(document.getElementById('resolution-select').value);
  const entries = DATASETS[backend] || [];
  const match = entries.find(e => e.resolution === resolution);
  return match ? match.file : entries[0]?.file;
}

async function loadData() {
  const dataPath = getSelectedFile();
  if (!dataPath) {
    console.warn('No dataset file available, using demo mode');
    document.getElementById('demo-badge').style.display = 'block';
    return generateDemoData(20);
  }
  try {
    const res = await fetch(dataPath);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    return parseSimData(json);
  } catch (err) {
    console.warn('Could not load simulation data, using demo mode:', err.message);
    document.getElementById('demo-badge').style.display = 'block';
    document.getElementById('loading-text').textContent = 'Generating demo data...';
    return generateDemoData(20);
  }
}

function parseSimData(json) {
  const gridSize = json.grid_size;
  const thetaMin = json.theta_min !== undefined ? json.theta_min : (json.theta_range || [-170, 170])[0];
  const thetaMax = json.theta_max !== undefined ? json.theta_max : (json.theta_range || [-170, 170])[1];
  const thetaRange = [thetaMin, thetaMax];
  const n3 = gridSize ** 3;
  const flipTimes = new Float32Array(n3);
  flipTimes.fill(NaN);
  let tMax = 0;

  if (json.flip_times) {
    // Format A: flat array of grid_size^3 values (null = no flip)
    const raw = json.flip_times;
    for (let i = 0; i < n3; i++) {
      const v = raw[i];
      flipTimes[i] = (v === null || v === undefined || !isFinite(v)) ? NaN : v;
      if (isFinite(flipTimes[i]) && flipTimes[i] > tMax) tMax = flipTimes[i];
    }
  } else if (json.points) {
    // Format B: sparse array of {theta: [t1,t2,t3], flip_time: f}
    const step = (thetaMax - thetaMin) / (gridSize - 1);
    for (const pt of json.points) {
      const i0 = Math.round((pt.theta[0] - thetaMin) / step);
      const i1 = Math.round((pt.theta[1] - thetaMin) / step);
      const i2 = Math.round((pt.theta[2] - thetaMin) / step);
      const idx = i0 * gridSize * gridSize + i1 * gridSize + i2;
      if (idx >= 0 && idx < n3) {
        flipTimes[idx] = pt.flip_time;
        if (pt.flip_time > tMax) tMax = pt.flip_time;
      }
    }
  }

  return { gridSize, thetaRange, flipTimes, tMax };
}

function generateDemoData(gridSize) {
  const n3 = gridSize ** 3;
  const flipTimes = new Float32Array(n3);
  const tMax = 15;
  for (let i = 0; i < n3; i++) {
    flipTimes[i] = Math.random() < 0.20 ? NaN : Math.random() * tMax;
  }
  return { gridSize, thetaRange: [-170, 170], flipTimes, tMax };
}

// ─── Three.js setup ───────────────────────────────────────────────────────────

function initThree() {
  const container = document.getElementById('canvas-container');

  state.scene = new THREE.Scene();
  state.scene.background = new THREE.Color(0x0a0a0f);

  state.camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.001, 100);
  state.camera.position.set(2.2, 1.6, 2.2);

  state.renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
  state.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  state.renderer.setSize(container.clientWidth, container.clientHeight);
  container.appendChild(state.renderer.domElement);

  state.controls = new OrbitControls(state.camera, state.renderer.domElement);
  state.controls.enableDamping = true;
  state.controls.dampingFactor = 0.08;
  state.controls.minDistance = 0.5;
  state.controls.maxDistance = 10;

  // Subtle axis helper
  const axesHelper = new THREE.AxesHelper(1.2);
  axesHelper.material.opacity = 0.35;
  axesHelper.material.transparent = true;
  state.scene.add(axesHelper);

  window.addEventListener('resize', onResize);
}

function onResize() {
  const container = document.getElementById('canvas-container');
  const w = container.clientWidth;
  const h = container.clientHeight;
  state.camera.aspect = w / h;
  state.camera.updateProjectionMatrix();
  state.renderer.setSize(w, h);
}

// ─── Point cloud construction ─────────────────────────────────────────────────

function computeColors() {
  const n3 = state.pointCount;
  const colors = state.rawColors;
  const flipTimes = state.flipTimes;
  const isStable = state.isStable;
  const tMax = state.tMax;
  const mapName = state.currentColormap;

  const stableColor = sampleColormap(0.02, mapName);

  for (let idx = 0; idx < n3; idx++) {
    const ft = flipTimes[idx];
    const stable = isStable[idx] === 1;

    let rgb;
    if (stable) {
      rgb = stableColor;
    } else {
      const normalizedT = tMax > 0 ? ft / tMax : 0;
      rgb = sampleColormap(normalizedT, mapName);
    }

    colors[idx * 3 + 0] = rgb[0];
    colors[idx * 3 + 1] = rgb[1];
    colors[idx * 3 + 2] = rgb[2];
  }
}

function buildPointCloud(data) {
  const { gridSize, thetaRange, flipTimes, tMax } = data;
  Object.assign(state, { gridSize, thetaRange, flipTimes, tMax });

  const n3 = gridSize ** 3;
  const positions = new Float32Array(n3 * 3);
  const colors    = new Float32Array(n3 * 3);
  const isStable  = new Uint8Array(n3);

  const thetaMin = thetaRange[0];
  const thetaSpan = thetaRange[1] - thetaRange[0];

  for (let idx = 0; idx < n3; idx++) {
    const ix = idx % gridSize;
    const iy = Math.floor(idx / gridSize) % gridSize;
    const iz = Math.floor(idx / (gridSize * gridSize));

    // Normalize to [-1, 1]
    const nx = (ix / (gridSize - 1)) * 2 - 1;
    const ny = (iy / (gridSize - 1)) * 2 - 1;
    const nz = (iz / (gridSize - 1)) * 2 - 1;

    positions[idx * 3 + 0] = nx;
    positions[idx * 3 + 1] = ny;
    positions[idx * 3 + 2] = nz;

    const ft = flipTimes[idx];
    isStable[idx] = !isFinite(ft) ? 1 : 0;
  }

  state.positions = positions;
  state.rawColors = colors;
  state.isStable  = isStable;
  state.visibleFlags = new Uint8Array(n3);
  state.pointCount = n3;

  // Compute colors using selected colormap
  computeColors();

  // Build geometry
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  const displayColors = new Float32Array(colors);
  geometry.setAttribute('color', new THREE.BufferAttribute(displayColors, 3));

  const material = new THREE.PointsMaterial({
    size: 0.026,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    opacity: 0.05,
    sizeAttenuation: true,
  });

  if (state.points) {
    state.scene.remove(state.points);
    state.geometry.dispose();
  }

  state.geometry = geometry;
  state.points = new THREE.Points(geometry, material);
  state.scene.add(state.points);

  return geometry;
}

// ─── Filter & visibility ──────────────────────────────────────────────────────

function applyFilters() {
  if (!state.points) return;

  const n3 = state.pointCount;
  const gridSize = state.gridSize;
  const thetaRange = state.thetaRange;
  const thetaMin = thetaRange[0];
  const thetaSpan = thetaRange[1] - thetaRange[0];

  const timeMin = parseFloat(document.getElementById('time-min').value) * state.tMax;
  const timeMax = parseFloat(document.getElementById('time-max').value) * state.tMax;
  const showStable = document.getElementById('show-stable').checked;
  const sliceThickness = parseFloat(document.getElementById('slice-thickness').value);

  const xEn  = document.getElementById('slice-x-en').checked;
  const yEn  = document.getElementById('slice-y-en').checked;
  const zEn  = document.getElementById('slice-z-en').checked;
  const xVal = parseFloat(document.getElementById('slice-x').value);
  const yVal = parseFloat(document.getElementById('slice-y').value);
  const zVal = parseFloat(document.getElementById('slice-z').value);

  // Octant visibility
  const octantVisible = new Array(8);
  for (let octantIdx = 0; octantIdx < 8; octantIdx++) {
    octantVisible[octantIdx] = document.getElementById('octant-' + (octantIdx + 1)).checked;
  }

  const colorAttr = state.geometry.getAttribute('color');
  const displayColors = colorAttr.array;
  const rawColors = state.rawColors;
  const flipTimes = state.flipTimes;
  const isStable  = state.isStable;

  let showing = 0;
  let totalFlipped = 0;

  for (let idx = 0; idx < n3; idx++) {
    const ix = idx % gridSize;
    const iy = Math.floor(idx / gridSize) % gridSize;
    const iz = Math.floor(idx / (gridSize * gridSize));

    const t1 = thetaMin + (ix / (gridSize - 1)) * thetaSpan;
    const t2 = thetaMin + (iy / (gridSize - 1)) * thetaSpan;
    const t3 = thetaMin + (iz / (gridSize - 1)) * thetaSpan;

    const stable = isStable[idx] === 1;
    const ft = flipTimes[idx];

    if (!stable) totalFlipped++;

    let visible = true;

    // Slice filtering
    if (xEn && Math.abs(t1 - xVal) > sliceThickness) visible = false;
    if (visible && yEn && Math.abs(t2 - yVal) > sliceThickness) visible = false;
    if (visible && zEn && Math.abs(t3 - zVal) > sliceThickness) visible = false;

    // Octant filtering
    if (visible) {
      const nx = state.positions[idx * 3 + 0];
      const ny = state.positions[idx * 3 + 1];
      const nz = state.positions[idx * 3 + 2];
      const octantIndex = (nx >= 0 ? 0 : 4) + (ny >= 0 ? 0 : 2) + (nz >= 0 ? 0 : 1);
      if (!octantVisible[octantIndex]) visible = false;
    }

    if (visible) {
      if (stable) {
        visible = showStable;
      } else {
        if (ft < timeMin || ft > timeMax) visible = false;
      }
    }

    if (visible) {
      showing++;
      displayColors[idx * 3 + 0] = rawColors[idx * 3 + 0];
      displayColors[idx * 3 + 1] = rawColors[idx * 3 + 1];
      displayColors[idx * 3 + 2] = rawColors[idx * 3 + 2];
    } else {
      displayColors[idx * 3 + 0] = 0;
      displayColors[idx * 3 + 1] = 0;
      displayColors[idx * 3 + 2] = 0;
    }
  }

  colorAttr.needsUpdate = true;
  updateStats(showing, n3, totalFlipped);
}

function updateStats(showing, total, totalFlipped) {
  const pct = total > 0 ? ((totalFlipped / total) * 100).toFixed(1) : '0.0';
  document.getElementById('stats').innerHTML =
    `Showing <span>${showing.toLocaleString()}</span> / ${total.toLocaleString()} points<br>` +
    `<span>${pct}%</span> flipped`;
}

// ─── Dataset switching ───────────────────────────────────────────────────────

async function reloadDataset() {
  const backend = document.getElementById('backend-select').value;
  const resolution = document.getElementById('resolution-select').value;

  const loading = document.getElementById('loading');
  loading.style.display = 'flex';
  loading.classList.remove('hidden');
  document.getElementById('loading-text').textContent = `Loading ${backend.toUpperCase()} ${resolution}\u00B3 data...`;
  document.getElementById('demo-badge').style.display = 'none';

  await new Promise(r => setTimeout(r, 50));

  const data = await loadData();
  buildPointCloud(data);
  initSliders();
  applyFilters();

  loading.classList.add('hidden');
  setTimeout(() => { loading.style.display = 'none'; }, 500);
}

function changeBackend() {
  const backend = document.getElementById('backend-select').value;
  populateResolutionSelect(backend);
  reloadDataset();
}

function changeResolution() {
  reloadDataset();
}

// ─── Colormap switching ──────────────────────────────────────────────────────

function changeColormap() {
  const mapName = document.getElementById('colormap-select').value;
  state.currentColormap = mapName;
  if (state.pointCount > 0) {
    computeColors();
    applyFilters();
  }
  drawLegend();
}

function toggleInvertColormap() {
  state.invertColormap = !state.invertColormap;
  const btn = document.getElementById('invert-btn');
  btn.style.borderColor = state.invertColormap ? 'var(--text-accent)' : '';
  btn.style.color = state.invertColormap ? 'var(--text-accent)' : '';
  if (state.pointCount > 0) {
    computeColors();
    applyFilters();
  }
  drawLegend();
}

// ─── Control handlers ─────────────────────────────────────────────────────────

function updatePointSize() {
  const val = parseFloat(document.getElementById('point-size').value);
  document.getElementById('point-size-val').textContent = val;
  if (state.points) {
    state.points.material.size = val * 0.013;
    state.points.material.needsUpdate = true;
  }
}

function updateOpacity() {
  const val = parseFloat(document.getElementById('opacity').value);
  document.getElementById('opacity-val').textContent = val.toFixed(2);
  if (state.points) {
    state.points.material.opacity = val;
    state.points.material.needsUpdate = true;
  }
}

function updateTimeFilter() {
  let minVal = parseFloat(document.getElementById('time-min').value);
  let maxVal = parseFloat(document.getElementById('time-max').value);

  if (minVal > maxVal) {
    minVal = maxVal;
    document.getElementById('time-min').value = minVal;
  }

  const minSec = (minVal * state.tMax).toFixed(1);
  const maxSec = maxVal >= 1.0 ? (state.tMax > 0 ? state.tMax.toFixed(1) : '--') : (maxVal * state.tMax).toFixed(1);
  document.getElementById('time-min-val').textContent = minSec + ' s';
  document.getElementById('time-max-val').textContent = maxSec + ' s';

  applyFilters();
}

function updateSliceThickness() {
  const val = parseInt(document.getElementById('slice-thickness').value);
  document.getElementById('slice-thickness-val').textContent = val + '°';
  applyFilters();
}

function updateSliceLabel(axis) {
  const val = parseInt(document.getElementById('slice-' + axis).value);
  document.getElementById('slice-' + axis + '-val').textContent = val + '°';
  applyFilters();
}

function togglePanel() {
  document.getElementById('controls').classList.toggle('collapsed');
}

function showAllOctants() {
  for (let octantIdx = 1; octantIdx <= 8; octantIdx++) {
    document.getElementById('octant-' + octantIdx).checked = true;
  }
  applyFilters();
}

function hideAllOctants() {
  for (let octantIdx = 1; octantIdx <= 8; octantIdx++) {
    document.getElementById('octant-' + octantIdx).checked = false;
  }
  applyFilters();
}

// Expose to inline handlers
window.updatePointSize = updatePointSize;
window.updateOpacity = updateOpacity;
window.updateTimeFilter = updateTimeFilter;
window.updateSliceThickness = updateSliceThickness;
window.updateSliceLabel = updateSliceLabel;
window.applyFilters = applyFilters;
window.togglePanel = togglePanel;
window.showAllOctants = showAllOctants;
window.hideAllOctants = hideAllOctants;
window.changeColormap = changeColormap;
window.toggleInvertColormap = toggleInvertColormap;
window.changeBackend = changeBackend;
window.changeResolution = changeResolution;

// ─── Render loop ──────────────────────────────────────────────────────────────

function animate() {
  requestAnimationFrame(animate);
  state.controls.update();
  state.renderer.render(state.scene, state.camera);
}

// ─── Initialise time-range sliders from real data ────────────────────────────

function initSliders() {
  const tMax = state.tMax;
  document.getElementById('time-max-val').textContent = (tMax > 0 ? tMax.toFixed(1) : '--') + ' s';
  document.getElementById('time-min-val').textContent = '0.0 s';
}

// ─── Main ─────────────────────────────────────────────────────────────────────

async function main() {
  initThree();
  animate();
  drawLegend();

  // Populate resolution dropdown for initial backend
  populateResolutionSelect(document.getElementById('backend-select').value);
  const data = await loadData();
  buildPointCloud(data);
  initSliders();
  applyFilters();

  // Hide loading screen
  const loading = document.getElementById('loading');
  loading.classList.add('hidden');
  setTimeout(() => { loading.style.display = 'none'; }, 500);
}

main();
</script>
